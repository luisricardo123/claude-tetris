<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section" id="combo-section" style="display:none">
          <span class="label">COMBO</span>
          <span class="value combo-value" id="combo">x0</span>
        </div>

        <div class="panel-section">
          <span class="label">POWER-UP</span>
          <div id="powerup-indicator"></div>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section">
          <span class="label">SKIN</span>
          <select id="skin-select">
            <option value="retro">Retro</option>
            <option value="neon">Neon</option>
            <option value="pastel">Pastel</option>
            <option value="pixel">Pixel Art</option>
          </select>
        </div>

        <div class="panel-section">
          <button id="theme-toggle" class="theme-toggle">☀ LIGHT</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">

        <!-- START SCREEN -->
        <div id="section-start" class="overlay-section">
          <p class="overlay-title-text title-start">TETRIS</p>
          <div id="records-start" class="records-container"></div>
          <button id="play-btn" class="btn-primary">Jugar</button>
          <button id="reset-records-start" class="btn-secondary">Resetear records</button>
        </div>

        <!-- PAUSE SCREEN -->
        <div id="section-pause" class="overlay-section">
          <p class="overlay-title-text title-pause">PAUSA</p>
          <button id="resume-btn" class="menu-btn">Reanudar</button>
          <button id="restart-pause-btn" class="menu-btn">Reiniciar</button>
          <button id="controls-btn" class="menu-btn">Ver controles</button>
          <ul id="pause-controls" class="pause-controls-list hidden">
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
          <div class="start-level-row">
            <label for="start-level-select" class="start-level-label">Nivel inicial</label>
            <select id="start-level-select" class="start-level-select">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>
              <option value="13">13</option>
              <option value="14">14</option>
              <option value="15">15</option>
            </select>
          </div>
        </div>

        <!-- GAME OVER SCREEN -->
        <div id="section-gameover" class="overlay-section">
          <p class="overlay-title-text title-gameover">GAME OVER</p>
          <p id="overlay-score"></p>

          <!-- Name entry form (shown when score qualifies) -->
          <div id="name-entry" class="name-entry hidden">
            <p class="name-entry-label">¡Nuevo récord! Ingresa tu nombre:</p>
            <input id="player-name" type="text" maxlength="12" placeholder="Tu nombre" class="name-input" />
            <button id="save-score-btn" class="btn-primary">Guardar</button>
          </div>

          <div id="records-gameover" class="records-container"></div>
          <button id="restart-btn" class="btn-primary">Reiniciar</button>
          <button id="reset-records-gameover" class="btn-secondary">Resetear records</button>
        </div>

      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
